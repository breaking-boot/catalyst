<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catalyst settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="be-settings be-settings-popup">
    <header class="be-settings-head">
      <h1>Catalyst</h1>
      <p class="be-settings-sub">Show or hide what Catalyst adds to boot.dev.</p>
    </header>
    <main>
      <section id="be-features" class="be-settings-group" aria-label="Features"></section>
    </main>
    <footer class="be-settings-foot">
      <button id="be-open-options" type="button" class="be-settings-link">
        Per-board diff options
      </button>
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
